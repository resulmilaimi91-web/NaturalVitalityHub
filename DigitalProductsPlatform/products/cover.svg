      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Shield Icon -->
  <circle cx="640" cy="200" r="80" fill="none" stroke="#4ade80" stroke-width="4"/>
  <path d="M610 200 L630 220 L670 180" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Title -->
  <text x="640" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">Security Scanner Pro</text>
  
  <!-- Subtitle -->
  <text x="640" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#4ade80">WordPress Security Plugin</text>
  
  <!-- Features -->
  <text x="640" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">🛡 Malware Scanner • Firewall • Login Protection • File Integrity</text>
  
  <!-- Price Badge -->
  <rect x="520" y="480" width="240" height="50" rx="25" fill="url(#btn)"/>
  <text x="640" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">$29 - Buy Now</text>
  
