  <text x="640" y="586" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fbbf24">🔒 30-Day Money Back Guarantee</text>
  
  <!-- Bottom features -->
  <text x="640" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">✓ Instant Download • 1 Year Updates • Email Support</text>
