version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: digistore
      POSTGRES_USER: digistore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digistore"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_uploads:/app/static/uploads
      - app_static:/app/static
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

volumes:
  postgres_data:
  app_uploads:
  app_static:
