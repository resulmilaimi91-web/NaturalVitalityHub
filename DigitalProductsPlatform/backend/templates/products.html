{% extends "base.html" %}
{% block title %}Browse Products - {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Browse Products</h1>
            <p class="text-gray-500 mt-1">Discover premium digital products</p>
        </div>
        <div class="flex items-center space-x-4 w-full md:w-auto">
            <div class="relative flex-1 md:flex-initial">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search" class="input-field !pl-10" placeholder="Search products..." oninput="loadProducts()">
            </div>
            <select id="category" class="input-field w-auto" onchange="loadProducts()">
                <option value="">All Categories</option>
                <option value="plugin">Plugins</option>
                <option value="theme">Themes</option>
                <option value="template">Templates</option>
                <option value="code">Code & Scripts</option>
                <option value="other">Other</option>
            </select>
        </div>
    </div>

    <div id="products-grid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="col-span-full text-center py-16 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl"></i>
            <p class="mt-4">Loading products...</p>
        </div>
    </div>
</div>

<script>
async function loadProducts() {
    const search = document.getElementById('search').value;
    const category = document.getElementById('category').value;
    const params = new URLSearchParams({ page: '1', per_page: '20' });
    if (search) params.set('search', search);
    if (category) params.set('category', category);

    try {
        const res = await fetch(`${API_BASE}/products?${params}`);
        const products = await res.json();
        const container = document.getElementById('products-grid');
        if (products.length === 0) {
            container.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400"><i class="fas fa-box-open text-5xl mb-4"></i><p class="text-lg">No products found</p><p class="text-sm mt-1">Try a different search or category</p></div>';
            return;
        }
        container.innerHTML = products.map(p => `
            <a href="/products/${p.slug}" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden card-hover group">
                <div class="aspect-video gradient-bg flex items-center justify-center">
                    ${p.thumbnail_url ? `<img src="${p.thumbnail_url}" class="w-full h-full object-cover">` : `<i class="fas fa-box text-white text-4xl opacity-50"></i>`}
                </div>
                <div class="p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="badge bg-indigo-100 text-indigo-700">${p.category}</span>
                        <span class="text-xs text-gray-400">v${p.current_version}</span>
                    </div>
                    <h3 class="font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors">${p.title}</h3>
                    <p class="text-sm text-gray-500 mt-1 line-clamp-2">${p.short_description || p.description?.substring(0, 80) || ''}</p>
                    <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                        <div>
                            ${p.sale_price > 0 ? `<span class="text-sm text-gray-400 line-through">€${p.price}</span><span class="text-lg font-bold text-red-600 ml-2">€${p.sale_price}</span>` : `<span class="text-lg font-bold text-gray-900">€${p.price}</span>`}
                        </div>
                        <div class="flex items-center space-x-3 text-xs text-gray-400">
                            <span><i class="fas fa-download mr-1"></i>${p.downloads_count || 0}</span>
                            <span><i class="fas fa-shopping-cart mr-1"></i>${p.sales_count || 0}</span>
                        </div>
                    </div>
                </div>
            </a>
        `).join('');
    } catch { document.getElementById('products-grid').innerHTML = '<div class="col-span-full text-center py-16 text-red-400">Failed to load products</div>'; }
}
loadProducts();
</script>
{% endblock %}
