{% extends "base.html" %}
{% block title %}Reset Password - {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-14 h-14 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-lock text-white text-xl"></i></div>
            <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
            <p class="text-gray-500 mt-1">Enter your new password</p>
        </div>
        <form id="reset-form" class="space-y-4">
            <input type="hidden" id="token" value="{{ token }}">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">New Password</label><input type="password" id="password" required minlength="6" class="input-field" placeholder="Min 6 characters"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label><input type="password" id="confirm" required class="input-field" placeholder="Repeat password"></div>
            <button type="submit" class="btn-primary w-full"><i class="fas fa-save mr-2"></i>Reset Password</button>
        </form>
        <div id="msg" class="mt-4 text-center text-sm hidden"></div>
    </div>
</div>
<script>
document.getElementById('reset-form').onsubmit = async function(e) {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    if (pw !== document.getElementById('confirm').value) { document.getElementById('msg').className = 'mt-4 text-center text-sm text-red-600'; document.getElementById('msg').textContent = 'Passwords do not match'; return; }
    const btn = this.querySelector('button');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';
    const res = await apiCall('/auth/reset-password', { method:'POST', body: JSON.stringify({ token: document.getElementById('token').value, password: pw }) });
    const data = await res.json();
    if (res.ok) {
        document.getElementById('msg').className = 'mt-4 text-center text-sm text-green-600';
        document.getElementById('msg').innerHTML = 'Password reset! <a href="/login" class="underline">Login</a>';
    } else {
        document.getElementById('msg').className = 'mt-4 text-center text-sm text-red-600';
        document.getElementById('msg').textContent = data.detail || 'Error';
    }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-save mr-2"></i>Reset Password';
};
</script>
{% endblock %}
