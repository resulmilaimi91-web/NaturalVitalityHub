{% extends "base.html" %}
{% block title %}Forgot Password - {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-14 h-14 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-key text-white text-xl"></i></div>
            <h1 class="text-2xl font-bold text-gray-900">Forgot Password?</h1>
            <p class="text-gray-500 mt-1">Enter your email and we'll send you a reset link</p>
        </div>
        <form id="forgot-form" class="space-y-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" id="email" required class="input-field" placeholder="you@example.com"></div>
            <button type="submit" class="btn-primary w-full"><i class="fas fa-paper-plane mr-2"></i>Send Reset Link</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6"><a href="/login" class="text-indigo-600 hover:underline">Back to Login</a></p>
        <div id="msg" class="mt-4 text-center text-sm hidden"></div>
    </div>
</div>
<script>
document.getElementById('forgot-form').onsubmit = async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';
    const res = await apiCall('/auth/forgot-password', { method:'POST', body: JSON.stringify({ email: document.getElementById('email').value }) });
    const data = await res.json();
    document.getElementById('msg').className = 'mt-4 text-center text-sm text-green-600';
    document.getElementById('msg').textContent = data.message || 'Check your email for the reset link.';
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send Reset Link';
};
</script>
{% endblock %}
