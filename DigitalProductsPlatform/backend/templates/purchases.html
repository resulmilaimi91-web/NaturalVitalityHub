{% extends "base.html" %}
{% block title %}My Purchases - {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">My Purchases</h1>
    <p class="text-gray-500 mb-8">Your purchased products and licenses</p>

    <div id="purchases-list" class="space-y-4">
        <div class="text-center py-16 text-gray-400"><i class="fas fa-spinner fa-spin text-3xl"></i><p class="mt-4">Loading...</p></div>
    </div>
</div>

<script>
async function loadPurchases() {
    if (!localStorage.getItem('token')) { window.location.href = '/login'; return; }
    try {
        const res = await apiCall('/checkout/purchases');
        const purchases = await res.json();
        const container = document.getElementById('purchases-list');
        if (purchases.length === 0) {
            container.innerHTML = '<div class="text-center py-16 text-gray-400"><i class="fas fa-shopping-bag text-5xl mb-4"></i><p class="text-lg font-medium">No purchases yet</p><p class="text-sm mt-1">Browse our products and find something you need</p><a href="/products" class="btn-primary inline-block mt-4"><i class="fas fa-search mr-2"></i>Browse Products</a></div>';
            return;
        }
        container.innerHTML = purchases.map(p => {
            const statusBadge = p.status === 'completed' ? 'bg-green-100 text-green-700' : p.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
            return `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex items-start space-x-4">
                    <div class="w-12 h-12 gradient-bg rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-box text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-semibold text-gray-900">${p.product_title || 'Unknown Product'}</h3>
                        <div class="flex items-center space-x-3 mt-1">
                            <span class="text-sm text-gray-500">€${p.amount.toFixed(2)}</span>
                            <span class="badge ${statusBadge}">${p.status}</span>
                            <span class="text-xs text-gray-400">${new Date(p.created_at).toLocaleDateString()}</span>
                        </div>
                        ${p.license_key ? `<p class="text-xs text-gray-400 mt-1"><i class="fas fa-key mr-1"></i>License: <code class="bg-gray-100 px-2 py-0.5 rounded">${p.license_key}</code></p>` : ''}
                    </div>
                </div>
                ${p.status === 'completed' ? `
                <div class="flex space-x-2">
                    <a href="/products/${p.product_slug}" class="btn-secondary text-sm !px-4 !py-2"><i class="fas fa-eye mr-1"></i>View</a>
                </div>` : p.status === 'pending' ? `<span class="text-sm text-yellow-600"><i class="fas fa-hourglass-half mr-1"></i>Awaiting payment</span>` : ''}
            </div>`;
        }).join('');
    } catch { document.getElementById('purchases-list').innerHTML = '<div class="text-center py-16 text-red-400">Failed to load purchases</div>'; }
}
loadPurchases();
</script>
{% endblock %}
