{% extends "base.html" %}
{% block title %}Payment Successful - {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-green-600 text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Payment Successful!</h1>
        <p class="text-gray-500 mb-8">Your purchase has been completed. You can now download your product and access your license key.</p>
        <div class="flex justify-center space-x-4">
            <a href="/my-purchases" class="btn-primary"><i class="fas fa-download mr-2"></i>Go to My Purchases</a>
            <a href="/products" class="btn-secondary">Browse More</a>
        </div>
    </div>
</div>
{% endblock %}
