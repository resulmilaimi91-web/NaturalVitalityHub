{% extends "base.html" %}
{% block title %}Profile - {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div id="profile-content">
        <div class="animate-pulse"><div class="h-8 bg-gray-200 rounded w-1/3 mb-6"></div><div class="h-32 bg-gray-200 rounded-xl"></div></div>
    </div>
</div>
<script>
async function loadProfile() {
    if (!currentUser) { window.location.href = '/login'; return; }
    document.getElementById('profile-content').innerHTML = `
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="gradient-bg h-32"></div>
            <div class="px-8 pb-8 -mt-16">
                <div class="w-24 h-24 gradient-bg rounded-full flex items-center justify-center text-white text-3xl font-bold border-4 border-white shadow-lg">${currentUser.username[0].toUpperCase()}</div>
                <h1 class="text-2xl font-bold text-gray-900 mt-4">${currentUser.full_name || currentUser.username}</h1>
                <p class="text-gray-500">@${currentUser.username}</p>
                ${currentUser.bio ? `<p class="text-gray-600 mt-3">${currentUser.bio}</p>` : ''}
                <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-500">
                    ${currentUser.website ? `<a href="${currentUser.website}" target="_blank" class="hover:text-indigo-600"><i class="fas fa-globe mr-1"></i>Website</a>` : ''}
                    ${currentUser.twitter ? `<a href="https://twitter.com/${currentUser.twitter}" target="_blank" class="hover:text-indigo-600"><i class="fab fa-twitter mr-1"></i>@${currentUser.twitter}</a>` : ''}
                    ${currentUser.github ? `<a href="https://github.com/${currentUser.github}" target="_blank" class="hover:text-indigo-600"><i class="fab fa-github mr-1"></i>${currentUser.github}</a>` : ''}
                </div>
                <div class="mt-6 flex gap-3">
                    <a href="/settings" class="btn-primary"><i class="fas fa-cog mr-2"></i>Edit Profile</a>
                </div>
            </div>
        </div>
    `;
}
loadProfile();
</script>
{% endblock %}
