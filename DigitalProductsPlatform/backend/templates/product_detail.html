{% extends "base.html" %}
{% block title %}{{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <div id="product-detail" class="grid md:grid-cols-2 gap-8">
        <div class="animate-pulse">
            <div class="aspect-video bg-gray-200 rounded-xl"></div>
            <div class="h-8 bg-gray-200 rounded mt-4 w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded mt-2"></div>
            <div class="h-4 bg-gray-200 rounded mt-1 w-1/2"></div>
        </div>
        <div class="animate-pulse">
            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
            <div class="h-10 bg-gray-200 rounded mt-4 w-1/3"></div>
            <div class="h-12 bg-gray-200 rounded mt-4"></div>
            <div class="h-12 bg-gray-200 rounded mt-2"></div>
        </div>
    </div>
</div>

<script>
const SLUG = '{{ slug }}';

async function loadProduct() {
    try {
        const res = await fetch(`${API_BASE}/products/${SLUG}`);
        if (!res.ok) { document.getElementById('product-detail').innerHTML = '<div class="col-span-full text-center py-16 text-red-400"><i class="fas fa-exclamation-circle text-5xl mb-4"></i><p>Product not found</p></div>'; return; }
        const p = await res.json();
        const owned = currentUser ? await checkOwnership(p.id) : false;
        renderProduct(p, owned);
    } catch { document.getElementById('product-detail').innerHTML = '<div class="col-span-full text-center py-16 text-red-400">Failed to load product</div>'; }
}

async function checkOwnership(productId) {
    try {
        const res = await apiCall('/checkout/purchases');
        const purchases = await res.json();
        return purchases.some(p => p.product_id === productId && p.status === 'completed');
    } catch { return false; }
}

function renderProduct(p, owned) {
    const price = p.sale_price > 0 ? p.sale_price : p.price;
    const hasSale = p.sale_price > 0;

    document.getElementById('product-detail').innerHTML = `
        <div>
            <div class="aspect-video gradient-bg rounded-xl flex items-center justify-center overflow-hidden">
                ${p.thumbnail_url ? `<img src="${p.thumbnail_url}" class="w-full h-full object-cover">` : `<i class="fas fa-box text-white text-6xl opacity-50"></i>`}
            </div>
            <div class="mt-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4">About This Product</h2>
                <div class="prose prose-gray max-w-none text-gray-600">${p.description || 'No description provided.'}</div>
            </div>
            ${p.versions && p.versions.length > 0 ? `
            <div class="mt-6">
                <h2 class="text-xl font-bold text-gray-900 mb-4">Version History</h2>
                <div class="space-y-3">${p.versions.map(v => `
                    <div class="bg-white border border-gray-200 rounded-lg p-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="badge bg-indigo-100 text-indigo-700">v${v.version}</span>
                                <p class="text-sm text-gray-600 mt-2">${v.changelog || 'No changelog'}</p>
                            </div>
                            <span class="text-xs text-gray-400">${new Date(v.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('')}</div>
                </div>` : ''}
            </div>
            <div class="mt-8" id="reviews-section">
                <h2 class="text-xl font-bold text-gray-900 mb-4"><i class="fas fa-star text-yellow-400 mr-2"></i>Reviews</h2>
                <div id="reviews-list"><p class="text-gray-400 text-sm">Loading reviews...</p></div>
            </div>
        </div>
        <div class="md:sticky md:top-24 self-start">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="badge bg-indigo-100 text-indigo-700">${p.category}</span>
                    <span class="text-xs text-gray-400">v${p.current_version}</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">${p.title}</h1>
                <p class="text-gray-500 text-sm mt-2">${p.short_description || ''}</p>

                <div class="flex items-baseline space-x-2 my-6">
                    ${hasSale ? `<span class="text-2xl text-gray-400 line-through">€${p.price}</span><span class="text-4xl font-bold text-red-600">€${p.sale_price}</span>` : `<span class="text-4xl font-bold text-gray-900">€${p.price}</span>`}
                </div>

                <div class="space-y-3 mb-6">
                    <div class="flex justify-between text-sm"><span class="text-gray-500">Seller</span><span class="font-medium">${p.seller_username || 'Unknown'}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-500">Downloads</span><span class="font-medium">${p.downloads_count || 0}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-500">Sales</span><span class="font-medium">${p.sales_count || 0}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-500">License Required</span><span class="font-medium">${p.requires_license ? 'Yes' : 'No'}</span></div>
                </div>

                ${owned ? `
                <a href="/my-purchases" class="btn-primary w-full text-center block"><i class="fas fa-download mr-2"></i>Download Now</a>
                ` : `
                <div class="flex gap-2">
                    <button onclick="addToCart('${p.id}','${p.title}',${price})" class="btn-secondary flex-1"><i class="fas fa-cart-plus mr-2"></i>Add to Cart</button>
                    <button onclick="buyNow('${p.id}')" class="btn-primary flex-1"><i class="fas fa-bolt mr-2"></i>Buy Now — €${price}</button>
                </div>
                `}

                <p class="text-xs text-gray-400 text-center mt-3">
                    <i class="fas fa-lock mr-1"></i>Secure payment via Paysera
                </p>

                ${p.tags ? `
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <div class="flex flex-wrap gap-2">${p.tags.split(',').map(t => `<span class="badge bg-gray-100 text-gray-600">#${t.trim()}</span>`).join('')}</div>
                </div>` : ''}
            </div>
        </div>
    `;
    loadReviews(p.id);
}

async function loadReviews(productId) {
    try {
        const res = await fetch(`${API_BASE}/reviews/product/${productId}`);
        const reviews = await res.json();
        let html = '';
        if (reviews.length === 0) html = '<p class="text-gray-400 text-sm">No reviews yet.</p>';
        else {
            const avg = (reviews.reduce((s, r) => s + r.rating, 0) / reviews.length).toFixed(1);
            html = `<div class="flex items-center mb-4"><span class="text-2xl font-bold mr-2">${avg}</span><span class="text-yellow-400">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))}</span><span class="text-sm text-gray-400 ml-2">(${reviews.length} reviews)</span></div>`;
            html += '<div class="space-y-3">' + reviews.map(r => `
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="flex justify-between items-start">
                        <div><span class="font-medium text-sm">${r.username}</span><span class="text-yellow-400 ml-2 text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div>
                        <span class="text-xs text-gray-400">${new Date(r.created_at).toLocaleDateString()}</span>
                    </div>
                    ${r.text ? `<p class="text-sm text-gray-600 mt-1">${r.text}</p>` : ''}
                </div>
            `).join('') + '</div>';
        }
        if (currentUser) {
            html += '<div class="mt-4 p-4 bg-white border border-gray-200 rounded-lg"><h3 class="font-semibold mb-2">Write a Review</h3><div class="mb-2"><span class="text-yellow-400 text-xl cursor-pointer" id="star-rating">★★★★★</span></div><textarea id="review-text" rows="2" class="input-field" placeholder="Share your experience..."></textarea><button onclick="submitReview(\''+productId+'\')" class="btn-primary mt-2 text-sm">Submit Review</button><span id="review-msg" class="text-sm ml-2"></span></div>';
        }
        document.getElementById('reviews-list').innerHTML = html;
    } catch { document.getElementById('reviews-list').innerHTML = '<p class="text-gray-400 text-sm">Could not load reviews.</p>'; }
}

let selectedRating = 5;
document.addEventListener('click', function(e) {
    const starEl = document.getElementById('star-rating');
    if (!starEl || !starEl.contains(e.target)) return;
    const rect = starEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const star = Math.ceil((x / rect.width) * 5);
    selectedRating = Math.max(1, Math.min(5, star));
    starEl.textContent = '★'.repeat(selectedRating) + '☆'.repeat(5-selectedRating);
});

async function submitReview(productId) {
    const text = document.getElementById('review-text').value;
    const res = await apiCall('/reviews', {
        method: 'POST',
        body: JSON.stringify({ product_id: productId, rating: selectedRating, text })
    });
    const msg = document.getElementById('review-msg');
    if (res.ok) { msg.className = 'text-sm ml-2 text-green-600'; msg.textContent = 'Review submitted!'; loadReviews(productId); }
    else { const d = await res.json(); msg.className = 'text-sm ml-2 text-red-600'; msg.textContent = d.detail || 'Error'; }
}

loadProduct();
</script>
{% endblock %}
