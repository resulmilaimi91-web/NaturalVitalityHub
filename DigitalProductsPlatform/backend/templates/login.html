{% extends "base.html" %}
{% block title %}Sign In - {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 gradient-bg rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-store text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" class="input-field" placeholder="your@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>
                <div class="text-right"><a href="/forgot-password" class="text-sm text-indigo-600 hover:underline">Forgot password?</a></div>
                <button type="submit" class="btn-primary w-full">
                    <i class="fas fa-spinner fa-spin hidden" id="spinner"></i>
                    <span id="btnText">Sign In</span>
                </button>
            </form>
            <p id="errorMsg" class="text-red-500 text-sm text-center mt-4 hidden"></p>
            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account? <a href="/register" class="text-indigo-600 hover:text-indigo-700 font-medium">Sign Up</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    btn.disabled = true; spinner.classList.remove('hidden'); btnText.textContent = 'Signing in...'; errorMsg.classList.add('hidden');

    try {
        const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');
        localStorage.setItem('token', data.access_token);
        window.location.href = '/';
    } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
        btn.disabled = false; spinner.classList.add('hidden'); btnText.textContent = 'Sign In';
    }
});
</script>
{% endblock %}
