{% extends "base.html" %}
{% block title %}Payment Failed - {{ app_name }}{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-times text-red-600 text-3xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Payment Failed</h1>
        <p class="text-gray-500 mb-8">The payment was cancelled or could not be processed. Please try again.</p>
        <div class="flex justify-center space-x-4">
            <a href="/products" class="btn-primary"><i class="fas fa-arrow-left mr-2"></i>Back to Products</a>
        </div>
    </div>
</div>
{% endblock %}
