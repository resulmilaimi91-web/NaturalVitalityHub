{% extends "base.html" %}
{% block title %}Sales Analytics - {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6"><i class="fas fa-chart-bar mr-2"></i>Sales Analytics</h1>
    <div id="analytics-content">
        <div class="grid gap-6">
            <div class="col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Overview</h2>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div><p class="text-sm text-gray-500">Total Products</p><p class="text-2xl font-bold text-gray-900" id="total-products">0</p></div>
                        <div><p class="text-sm text-gray-500">Total Sales</p><p class="text-2xl font-bold text-indigo-600" id="total-sales">0</p></div>
                        <div><p class="text-sm text-gray-500">Total Revenue</p><p class="text-2xl font-bold text-green-600" id="total-revenue">€0.00</p></div>
                        <div><p class="text-sm text-gray-500">Total Downloads</p><p class="text-2xl font-bold text-purple-600" id="total-downloads">0</p></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="grid gap-6 mt-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Sales Over Time</h2>
                    <div id="daily-chart" class="h-64 bg-gray-50 rounded-xl"></div>
                </div>
            </div>
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">By Category</h2>
                    <div id="category-chart" class="space-y-3"></div>
                </div>
            </div>
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Top Products</h2>
                    <div id="top-products" class="space-y-3"></div>
                </div>
            </div>
        </div>
        <div class="mt-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Recent Sales</h2>
                <div id="recent-sales" class="space-y-3"></div>
            </div>
        </div>
    </div>
</div>
<script>
async function loadAnalytics() {
    if (!currentUser) { window.location.href = '/login'; return; }
    document.getElementById('analytics-content').innerHTML = '<div class="text-center py-16 text-gray-400"><i class="fas fa-spinner fa-spin text-4xl mb-4"></i><p>Loading analytics...</p></div>';
    try {
        const res = await apiCall('/dashboard/analytics');
        const data = await res.json();
        renderAnalytics(data);
    } catch (e) {
        document.getElementById('analytics-content').innerHTML = '<div class="text-center py-16 text-gray-400"><p>Failed to load analytics</p></div>';
    }
}

function renderAnalytics(data) {
    document.getElementById('total-products').textContent = data.total_products || 0;
    document.getElementById('total-sales').textContent = data.total_sales || 0;
    document.getElementById('total-revenue').textContent = '€' + (data.total_revenue || 0).toFixed(2);
    document.getElementById('total-downloads').textContent = data.total_downloads || 0;
    
    // Daily sales chart (simple bar chart using divs)
    const dailyChart = document.getElementById('daily-chart');
    if (data.daily_sales && data.daily_sales.length > 0) {
        const maxAmount = Math.max(...data.daily_sales.map(d => d.amount), 1);
        let html = '<div class="h-full flex items-end space-x-2 px-4 pb-4">';
        data.daily_sales.forEach(day => {
            const height = (day.amount / maxAmount) * 100;
            html += `<div class="flex-1 bg-indigo-200 rounded-t-lg relative" title="€${day.amount} (${day.count} sales)" style="height:${height}%">
                <div class="absolute bottom-0 left-0 right-0 text-xs text-indigo-600 text-center">${day.date.slice(5)}</div>
            </div>`;
        });
        html += '</div>';
        dailyChart.innerHTML = html;
    } else {
        dailyChart.innerHTML = '<p class="text-center py-8 text-gray-400">No sales data yet</p>';
    }
    
    // Category breakdown
    const categoryDiv = document.getElementById('category-chart');
    if (data.category_breakdown && data.category_breakdown.length > 0) {
        let html = '';
        data.category_breakdown.forEach(cat => {
            const width = (cat.sales / Math.max(...data.category_breakdown.map(c => c.sales), 1)) * 100;
            html += `<div class="flex items-center py-2">
                <span class="w-20 text-sm">${cat.category}</span>
                <div class="flex-1 bg-gray-200 rounded-full h-2.5">
                    <div class="bg-indigo-600 h-2.5 rounded-full" style="width:${width}%"></div>
                </div>
                <span class="w-20 text-sm text-right">${cat.sales} sales (€${cat.revenue.toFixed(2)})</span>
            </div>`;
        });
        categoryDiv.innerHTML = html;
    } else {
        categoryDiv.innerHTML = '<p class="text-center py-4 text-gray-400">No category data</p>';
    }
    
    // Top products
    const topDiv = document.getElementById('top-products');
    if (data.top_products && data.top_products.length > 0) {
        let html = '';
        data.top_products.forEach(p => {
            html += `<div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-b-0">
                <div class="flex-1"><span class="font-medium">${p.product_title}</span><span class="text-xs text-gray-500 ml-2">€${p.revenue.toFixed(2)}</span></div>
                <span class="text-indigo-600 font-semibold">${p.sales} sales</span>
            </div>`;
        });
        topDiv.innerHTML = html;
    } else {
        topDiv.innerHTML = '<p class="text-center py-4 text-gray-400">No products yet</p>';
    }
    
    // Recent sales
    const recentDiv = document.getElementById('recent-sales');
    if (data.recent_sales && data.recent_sales.length > 0) {
        let html = '';
        data.recent_sales.forEach(s => {
            html += `<div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-b-0">
                <div class="flex-1"><span class="font-medium">${s.product_title}</span><span class="text-xs text-gray-500 ml-2">${s.product_slug}</span></div>
                <span class="text-green-600 font-semibold">€${s.amount}</span>
            </div>`;
        });
        recentDiv.innerHTML = html;
    } else {
        recentDiv.innerHTML = '<p class="text-center py-4 text-gray-400">No recent sales</p>';
    }
}

loadAnalytics();
</script>
{% endblock %}
