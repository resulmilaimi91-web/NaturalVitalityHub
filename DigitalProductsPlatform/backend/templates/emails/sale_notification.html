<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:0}.container{max-width:600px;margin:20px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:30px;text-align:center}.header h1{color:#fff;margin:0;font-size:24px}.content{padding:30px}.content h2{color:#333;margin-top:0}.content p{color:#555;line-height:1.6}.footer{background:#f8f8f8;padding:20px;text-align:center;font-size:12px;color:#999}.amount{font-size:24px;font-weight:bold;color:#2e7d32}</style></head>
<body>
<div class="container">
<div class="header"><h1>{{ app_name }}</h1></div>
<div class="content">
<h2>New Sale! 🎉</h2>
<p>Hi <strong>{{ seller_name }}</strong>,</p>
<p>Great news! Someone just purchased <strong>{{ product_title }}</strong>.</p>
<p class="amount">&euro;{{ "%.2f"|format(amount) }}</p>
<p>Buyer: {{ buyer_email }}</p>
<p>Log in to your dashboard to see your updated balance and sales stats.</p>
</div>
<div class="footer">&copy; 2026 {{ app_name }}. All rights reserved.</div>
</div>
</body>
</html>
