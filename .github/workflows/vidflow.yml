name: VidFlow
on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      product:
        description: Product name
        required: false
        default: ''
        type: string
      privacy:
        type: choice
        default: public
        options: [unlisted, public, private]
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: pip install -q google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client gtts pillow moviepy requests
      - run: |
          mkdir -p images
          for url in \
            https://images.unsplash.com/photo-1559757175-5700dde675bc?w=1920 \
            https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=1920 \
            https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1920 \
            https://images.unsplash.com/photo-1519823551278-64ac52734f5c?w=1920 \
            https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=1920; do
            curl -sL "$url" -o "images/bg_$(basename $RANDOM).jpg" 2>/dev/null || true
          done
          ls images/ 2>/dev/null || echo "No images downloaded"
      - run: echo "$CLIENT" | base64 --decode > client_secret.json 2>/dev/null || true
        env:
          CLIENT: ${{ secrets.CLIENT_SECRET_JSON }}
      - run: echo "$TOKEN" | base64 --decode > token.pickle 2>/dev/null || true
        env:
          TOKEN: ${{ secrets.TOKEN_PICKLE }}
      - run: |
          PROD="${{ github.event.inputs.product }}"
          PRIV="${{ github.event.inputs.privacy }}"
          if [ -z "$PROD" ]; then
            python youtube_content_automation.py generate-auto "${PRIV:-public}"
          else
            python youtube_content_automation.py generate-auto "$PROD" "${PRIV:-public}"
          fi
      - name: Save published tracker
        run: |
          if [ -f "published_products.json" ] && [ -s "published_products.json" ]; then
            git config user.name "NaturalVitalityHub Bot"
            git config user.email "bot@naturalvitalityhub.com"
            git add published_products.json
            git diff --cached --quiet || git commit -m "update published tracker"
            git push
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: out-${{ github.run_id }}
          path: output/
          retention-days: 3
