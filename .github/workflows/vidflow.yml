name: VidFlow
on:
  workflow_dispatch:
    inputs:
      product:
        description: Product name
        required: false
        default: ''
        type: string
      privacy:
        type: choice
        default: unlisted
        options: [unlisted, public, private]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: pip install -q google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client gtts pillow moviepy requests
      - run: echo "$CLIENT" | base64 --decode > client_secret.json 2>/dev/null || true
        env:
          CLIENT: ${{ secrets.CLIENT_SECRET_JSON }}
      - run: echo "$TOKEN" | base64 --decode > token.pickle 2>/dev/null || true
        env:
          TOKEN: ${{ secrets.TOKEN_PICKLE }}
      - run: |
          PROD="${{ github.event.inputs.product }}"
          PRIV="${{ github.event.inputs.privacy }}"
          if [ -z "$PROD" ]; then
            python youtube_content_automation.py generate-auto "${PRIV:-unlisted}"
          else
            python youtube_content_automation.py generate-auto "$PROD" "${PRIV:-unlisted}"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: out-${{ github.run_id }}
          path: output/
          retention-days: 3
