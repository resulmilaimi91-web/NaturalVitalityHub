name: YouTube Auto Generate & Upload

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      product:
        description: 'Product name (empty = random)'
        required: false
        type: string
      privacy:
        description: 'Video privacy'
        required: false
        default: 'public'
        type: choice
        options:
          - public
          - unlisted
          - private

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --upgrade pip
          pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
          pip install gtts pillow moviepy requests schedule

      - name: Setup YouTube credentials
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_PICKLE: ${{ secrets.TOKEN_PICKLE }}
        run: |
          if [ -n "$CLIENT_SECRET_JSON" ]; then
            echo "$CLIENT_SECRET_JSON" | base64 --decode > client_secret.json
            echo "[OK] client_secret.json restored"
          else
            echo "[X] CLIENT_SECRET_JSON secret not set. Add it in GitHub repo Settings > Secrets > Actions"
          fi
          if [ -n "$TOKEN_PICKLE" ]; then
            echo "$TOKEN_PICKLE" | base64 --decode > token.pickle
            echo "[OK] token.pickle restored"
          else
            echo "[WARN] TOKEN_PICKLE not set. YouTube upload will require manual auth."
          fi

      - name: Generate video for a product
        id: generate
        run: |
          PRODUCT="${{ github.event.inputs.product }}"
          if [ -z "$PRODUCT" ]; then
            python -c "
import json, random
from pathlib import Path
data = json.loads(Path('affiliate-bot/data/tracking.json').read_text())
links = data.get('links', [])
product = random.choice(links)
print(f'SELECTED_PRODUCT={product[\"produkti\"]}')
print(json.dumps(product))
" > product_info.txt
            source product_info.txt
            echo "Selected: $SELECTED_PRODUCT"
          fi
          echo "product=$SELECTED_PRODUCT" >> $GITHUB_OUTPUT

      - name: Generate script package
        run: |
          python youtube_content_automation.py generate "${{ steps.generate.outputs.product }}"
          echo "Script generated successfully"

      - name: Create video from script
        id: video
        continue-on-error: true
        run: |
          LATEST_DIR=$(ls -td output/scripts/*/ | head -1)
          echo "Using script from: $LATEST_DIR"
          python -c "
import sys, json, os
sys.path.insert(0, '.')
from pathlib import Path
from youtube_content_automation import create_video_from_package

latest = sorted(Path('output/scripts').iterdir(), key=lambda p: p.stat().st_mtime, reverse=True)[0]
meta = json.loads((latest / 'package.json').read_text())
script = (latest / 'script.txt').read_text()
desc = (latest / 'description.txt').read_text()

pkg = {
    'title': meta['title'],
    'product': meta['product'],
    'description': desc,
    'script': script,
    'tags': ['health', 'supplements', meta['product'].replace(' ', '')],
    'affiliate_url': meta.get('affiliate_url', ''),
    'niche': meta.get('niche', 'general')
}

video_path = create_video_from_package(pkg, meta['product'][:20])
if video_path:
    print(f'VIDEO_PATH={video_path}')
    with open(os.environ.get('GITHUB_OUTPUT', 'video_output.txt'), 'w') as f:
        f.write(f'video_path={video_path}')
"
          echo "Video creation attempted. Check logs above."

      - name: Upload to YouTube
        if: success() && hashFiles('client_secret.json') != ''
        env:
          PRIVACY: ${{ github.event.inputs.privacy || 'public' }}
        run: |
          python -c "
import sys, json, os
sys.path.insert(0, '.')

# Find latest video
from pathlib import Path
videos = list(Path('output/videos').glob('*.mp4'))
if not videos:
    print('[X] No video found to upload')
    sys.exit(0)

video_path = str(sorted(videos, key=lambda p: p.stat().st_mtime, reverse=True)[0])
print(f'[OK] Video to upload: {video_path}')

# Find latest script for metadata
scripts = sorted(Path('output/scripts').iterdir(), key=lambda p: p.stat().st_mtime, reverse=True)
if scripts:
    meta = json.loads((scripts[0] / 'package.json').read_text())
    title = meta['title']
    desc = (scripts[0] / 'description.txt').read_text()
    tags = ['health', 'supplements', meta['product'].replace(' ', '')]
else:
    title = os.path.basename(video_path)
    desc = 'Auto-generated video'
    tags = ['health']

privacy = os.environ.get('PRIVACY', 'public')

# Upload
sys.path.insert(0, '.')
from youtube_upload import upload_video
url = upload_video(video_path, title, desc, tags, privacy)
print(f'[OK] Uploaded: {url}')
"
        shell: python

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-content
          path: |
            output/scripts/
            output/videos/
          retention-days: 3

      - name: Summary
        if: always()
        run: |
          echo "## YouTube Automation Run" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Product: ${{ steps.generate.outputs.product }}" >> $GITHUB_STEP_SUMMARY
          echo "- Video: [See artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
