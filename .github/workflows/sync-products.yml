name: Sync Digistore24 Products
on:
  push:
    paths:
      - "digistore24-products.csv"
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Fetch via API (if key exists)
        run: |
          if [ -n "${{ secrets.DIGISTORE24_API_KEY }}" ]; then
            python scripts/fetch-digistore-products.py
          fi
        env:
          DIGISTORE24_API_KEY: ${{ secrets.DIGISTORE24_API_KEY }}
      - name: Parse CSV (if exists)
        run: |
          if [ -f "digistore24-products.csv" ]; then
            python scripts/sync-digistore-products.py
          fi
      - run: |
          if [ -f "affiliate-bot/data/tracking.json" ]; then
            git config user.name "NaturalVitalityHub Bot"
            git config user.email "bot@naturalvitalityhub.com"
            git add affiliate-bot/data/tracking.json
            git diff --cached --quiet || git commit -m "auto-sync products"
            git push
          fi
