name: Daily Upload
on:
  workflow_dispatch:
    inputs:
      product:
        description: 'Product (empty=random)'
        required: false
        type: string
      privacy:
        description: 'Privacy'
        required: false
        default: 'unlisted'
        type: choice
        options:
          - unlisted
          - public
          - private
  schedule:
    - cron: '0 6 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - run: pip install -q google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client gtts pillow moviepy requests
      - run: echo "${{ secrets.CLIENT_SECRET_JSON }}" | base64 --decode > client_secret.json 2>/dev/null || true
      - run: echo "${{ secrets.TOKEN_PICKLE }}" | base64 --decode > token.pickle 2>/dev/null || true
      - name: Generate
        run: |
          P="${{ github.event.inputs.product }}"
          python youtube_content_automation.py generate "${P:-Provadent}"
      - name: Create video
        continue-on-error: true
        run: |
          python -c "
import sys, json, os
sys.path.insert(0, '.')
from pathlib import Path
from youtube_content_automation import create_video_from_package
l = sorted(Path('output/scripts').iterdir(), key=lambda p: p.stat().st_mtime, reverse=True)[0]
m = json.loads((l / 'package.json').read_text())
t, s, d = (l / 'title.txt').read_text(), (l / 'script.txt').read_text(), (l / 'description.txt').read_text()
p = {'title': t, 'product': m['product'], 'description': d, 'script': s, 'tags': ['health', m['product'].replace(' ', '')], 'affiliate_url': m.get('affiliate_url',''), 'niche': m.get('niche','general')}
vp = create_video_from_package(p, m['product'][:20])
if vp: print(f'VIDEO_CREATED={vp}')
"
      - name: Upload
        if: hashFiles('client_secret.json') != ''
        run: |
          python -c "
import sys, os
sys.path.insert(0, '.')
from pathlib import Path
v = list(Path('output/videos').glob('*.mp4'))
if not v: print('No video'); exit(0)
vp = str(sorted(v, key=lambda p: p.stat().st_mtime, reverse=True)[0])
s = sorted(Path('output/scripts').iterdir(), key=lambda p: p.stat().st_mtime, reverse=True)
if s:
    import json
    m = json.loads((s[0] / 'package.json').read_text())
    title, desc = m['title'], (s[0] / 'description.txt').read_text()
    tags = ['health', m['product'].replace(' ','')]
else:
    title, desc, tags = os.path.basename(vp), 'Auto', ['health']
from youtube_upload import upload_video
r = upload_video(vp, title, desc, tags, '${{ github.event.inputs.privacy || 'unlisted' }}')
print(f'OK_URL={r}')
"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: output-${{ github.run_id }}
          path: output/
          retention-days: 3
